name: Deploy

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch: {}

env:
  DOCKERHUB_IMAGE: huipengcheng/anyfeed
  ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
  ACR_IMAGE: ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine image tags
        id: meta
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${{ github.ref_name }}"
            DOCKERHUB_TAGS="${{ env.DOCKERHUB_IMAGE }}:${VERSION},${{ env.DOCKERHUB_IMAGE }}:latest"
            ACR_TAGS="${{ env.ACR_IMAGE }}:${VERSION},${{ env.ACR_IMAGE }}:latest"
          elif [[ "${{ github.ref }}" == refs/heads/main ]]; then
            DOCKERHUB_TAGS="${{ env.DOCKERHUB_IMAGE }}:dev"
            ACR_TAGS="${{ env.ACR_IMAGE }}:dev"
          fi
          echo "tags=${DOCKERHUB_TAGS},${ACR_TAGS}" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to Alibaba Cloud ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
