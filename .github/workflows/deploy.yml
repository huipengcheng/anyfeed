name: Deploy

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  # Alibaba Cloud Container Registry
  # Format: registry.cn-<region>.aliyuncs.com/<namespace>/<repo>
  REGISTRY: registry.cn-hangzhou.aliyuncs.com
  NAMESPACE: ${{ secrets.ACR_NAMESPACE }}
  IMAGE_NAME: anyfeed

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine image tag
        id: meta
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="$(echo ${{ github.sha }} | cut -c1-7)"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "image=${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:${TAG}" >> "$GITHUB_OUTPUT"

      - name: Login to Alibaba Cloud Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USERNAME }}
          key: ${{ secrets.ECS_SSH_KEY }}
          port: ${{ secrets.ECS_SSH_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH || '/opt/anyfeed' }}

            # Login to ACR
            podman login \
              -u "${{ secrets.ACR_USERNAME }}" \
              -p "${{ secrets.ACR_PASSWORD }}" \
              ${{ env.REGISTRY }}

            # Pull new image
            REGISTRY_URL="${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}" \
            IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}" \
            podman-compose pull

            # Restart service
            REGISTRY_URL="${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}" \
            IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}" \
            podman-compose up -d --remove-orphans

            # Clean up old images
            podman image prune -f
