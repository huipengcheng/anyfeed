services:
  anyfeed:
    image: ${IMAGE:-huipengcheng/anyfeed}:${IMAGE_TAG:-latest}
    container_name: anyfeed
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "2525:2525"
    volumes:
      - ./data:/app/data
      - ./configs/config.yaml:/app/configs/config.yaml:ro
    environment:
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
